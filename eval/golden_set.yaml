- id: 7
  question: "Кто по психотипу (MBTI) Фаизова Эльвина и как с ней лучше общаться?"
  weight: 0.5
  source: manual
  type: concept
  reference_answer: |
    Эльвина — ISTJ-T (Интроверт, Сенсорик, Логик, Судья, Турбулентный).

    Рекомендации по общению:
    - Будьте чёткими и конкретными — ISTJ ценят точность и ясность.
    - Опирайтесь на факты и логику, не уходите в эмоциональные рассуждения.
    - Уважайте стремление к порядку, предоставляйте информацию в структурированном виде.
    - Будьте терпеливы — им нужно время для анализа.
    - Избегайте резких изменений без объяснений.
    - Цените надёжность и аккуратность, признавайте усилия.
    - Общение должно быть деловым, уважительным и структурированным.
  reference_docs:
    - "02. Работа/01. Интерлизинг/Команда/Сотрудники/Фаизова Эльвина.md"

