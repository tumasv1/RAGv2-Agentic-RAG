- id: 2
  question: "Обобщи что было сделано в 2025 году ориентируясь на информацию из Митапа блока развития."
  weight: 1.0
  source: manual
  type: concept
  reference_answer: |
    # Итоги 2025 года по данным митапов блока развития
    ## Команда и кадры
    - Команда выросла с 14 до 15 сотрудников (принят новый мл. аналитик в мае)
    - Повышена Морозова Ксения до аналитика (декабрь)
    - Переведена Морозова на роль аналитика с декабря, тимлид — Степанова
    - Выведена Белова в декрет
    - Уволился Зайцев Дмитрий (февраль), задачи распределены
    - Степанова взяла роль тимлида подгруппы с апреля
    - Нанята Лебедева Юлия как новый системный аналитик (сентябрь)
    - Орлова — обсуждался перевод от подрядчиков в штат
    ## Процессы и стандарты
    - Изменён процесс предварительной оценки задач — повышение точности
    - Введён учёт ретро в системе управления задачами
    - Обновлён процесс релизов CRM, донесён до команды
    - Введён код-ревью при участии внешних подрядчиков
    - Налажено взаимодействие БА и СА, зафиксированы договорённости
    - Проработан и внедрён учёт отпусков/отсутствий
    - Введён формат совместной разработки технического решения (аналитик + разработчик в параллель)
    - Создан упрощённый формат работы с архитекторами, вынесен на архитектурный комитет
    - Принято решение по управлению реестром систем/сервисов на архитектурном комитете
    ## Проекты
    - Участие в проектах HR: кадровый учёт, КЭДО, настройка единой управленческой кадровой структуры
    - Проект "Интеграция кадровых данных" — прорабатывали Kafka с архитектором
    - Проект кредитного бюро — выделены ресурсы, проведено обучение СА
    - Проект Госзакупки — выделена Павлова
    - Проект Инкассо — организовано командное взаимодействие
    - Проект автоматизации отчётности — выделена Степанова
    - Проект НДС — выделена Лебедева
    - Внедрение новой системы — выделен аналитик (декабрь)
    ## Продукт UI/UX
    - Проведён аудит WEB CRM, приоритизированы улучшения
    - Запущен и завершён SUS-опрос удовлетворённости WEB CRM
    - Определена роль технического владельца UI — Павлова
    - Сформирован раздел для учёта пожеланий по UI
    - Подготовлены макеты по результатам аудита
    ## Архитектура и разработка требований
    - Внедрён учёт HLD как вида работ для развития архитектурных компетенций
    - Проработана концепция MD + Git + S3 для управления требованиями
    - Подготовлен шаблон БФТ в формате Markdown (Docs as Code)
    - Сформирован концепт перекрёстной проверки ФТ (Peer Review)
    - Обновлён реестр систем/сервисов
    ## ИИ и новые технологии
    - Запущена работа над RAG-решением на данных системы управления
    - Собраны примеры документов для тестирования поиска в RAG
    - Проведено обучение по использованию LLM для формирования схем HLD
    ## Обучение и развитие
    - Участие группы в конференции аналитиков
    - Обучение СА по новому стеку (2 части)
    - Обучение по работе с заявками
    - Сбор и согласование ИПР по сотрудникам
    - Пройден тест MBTI командой
    ## Карьерная лестница и домены
    - Проработана карьерная лестница системного аналитика (с учётом замечаний руководства)
    - Начата активность по разделению группы на функциональные домены
    - Согласован принцип: домен — это совокупность бизнес-возможностей
