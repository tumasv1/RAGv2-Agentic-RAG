    поддержки (1Л) на вторую линию поддержки (2Л)?
  weight: 0.5
  source: synthetic
  type: fact
  reference_answer: 'Инцидент передается на 2Л только при соблюдении всех условий:
    1) проблема и ее решение отсутствуют в Базах Знаний и документации; 2) в 1С:ITIL
    не найден активный инцидент или решение по аналогичной проблеме; 3) действия пользователя
    не противоречат инструкциям и логике работы системы; 4) сотрудник 1Л подтвердил
    существование проблемы, воспроизведя ошибку или убедившись в отсутствии прав.'
