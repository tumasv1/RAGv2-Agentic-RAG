{% extends "base.html" %}

{% block body_attrs %} class="chat-page"{% endblock %}
{% block title %}Чат — RAGv2{% endblock %}

{% block content %}
<section class="chat">
  <div class="chat-header">
    <h1>Спроси агента</h1>
    <p class="muted">Thread: <code id="thread-id">{{ thread_id }}</code>
      <button id="reset-thread-btn" type="button" class="btn-ghost">Сбросить сессию</button>
    </p>
  </div>

  <div id="chat-history" class="chat-history"></div>

  <div id="banner" class="banner hidden"></div>

  <form id="chat-form" class="chat-input-area">
    <textarea id="question" name="question" rows="2" maxlength="4000" required
              placeholder="Задай вопрос…"></textarea>
    <div class="chat-input-row">
      <button type="submit" class="btn-primary">Отправить</button>
      <span id="loader" class="loader hidden">обрабатываю…</span>
    </div>
  </form>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='js/app.js') }}"></script>
<script>
  initChat();
</script>
{% endblock %}
