<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Agentic RAG{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/theme-geo.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/theme-minimal.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body class="theme-minimal{% block body_attrs %}{% endblock %}">
  <header class="topbar">
    <div class="topbar-inner">
      {% if request.url.path == '/' %}
      <button id="sidebar-toggle" type="button" class="sidebar-toggle" aria-label="История диалогов" title="История диалогов">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      {% endif %}
      <nav class="nav">
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Chat</a>
        <a href="/debug" class="{% if request.url.path == '/debug' %}active{% endif %}">Debug</a>
        <a href="/chunks" class="{% if request.url.path == '/chunks' %}active{% endif %}">Retriever</a>
        <a href="/admin" class="{% if request.url.path == '/admin' %}active{% endif %}">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>Agentic RAG · localhost</span>
  </footer>

  <script src="{{ url_for('static', path='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
