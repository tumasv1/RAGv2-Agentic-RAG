<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Agentic RAG{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/theme-geo.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/theme-minimal.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body{% block body_attrs %}{% endblock %}>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="brand">Agentic RAG</a>
      <nav class="nav">
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Chat</a>
        <a href="/debug" class="{% if request.url.path == '/debug' %}active{% endif %}">Debug</a>
        <a href="/chunks" class="{% if request.url.path == '/chunks' %}active{% endif %}">Retriever</a>
        <a href="/admin" class="{% if request.url.path == '/admin' %}active{% endif %}">Admin</a>
      </nav>
      <button id="theme-toggle-btn" type="button" class="theme-toggle" title="Переключить тему">default</button>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>Agentic RAG · localhost</span>
  </footer>

  <script src="{{ url_for('static', path='js/app.js') }}"></script>
  <script>initTheme();</script>
  {% block scripts %}{% endblock %}
</body>
</html>
