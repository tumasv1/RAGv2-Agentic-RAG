# — Настройки LLM —
llm:
  temperature: 0.7
  max_tokens: 2000
  request_timeout: 60          # таймаут для LangChain ChatOpenAI (секунды)

# — Настройки поиска —
search:
  max_chunks: 15                            # жёсткий лимит чанков для LLM
  fetch_k: 15                               # кандидатов из dense-ветки
  bm25_top_k: 3                             # кандидатов из BM25-ветки (BM25 точечный — хватает 3)
  dense_score_threshold: 0.84               # cosine (0–1), подбирается по RAGAS
  sparse_score_threshold: 1.35              # BM25, подбирается по RAGAS; 1.35 = безопасный пол (min ref-score по golden_set_bm25=1.407)
  reranker_score_threshold: -3.3            # cross-encoder, подбирается по RAGAS
  use_reranking: false                      # вкл/выкл реранкер
  reranker_model: "jinaai/jina-reranker-v2-base-multilingual"  # мультиязычный cross-encoder (ONNX)

# — Настройки индексации —
ingest:
  chunk_size: 800             # размер child-чанка (символов; ищется поиском)
  chunk_overlap: 300           # перекрытие между child-чанками
  parent_chunk_size: 2000      # размер parent-чанка (возвращается LLM)
  parent_chunk_overlap: 200    # overlap между parent-чанками — пограничный текст попадает в два parent'а
  enrich_content: true         # препендить метаданные к тексту чанка (имя файла, путь, тип, теги)
  exclude_folders:             # папки, которые пропускаем при сканировании vault
    - "04. Шаблоны"
    - "97. Вложения"
    - "98. Ingest"
    - "99. Правила"
  exclude_filenames:           # файлы, которые пропускаем
    - "00_HUB.md"

# — Настройки агента —
agent:
  max_iterations: 5            # guardrail — максимум итераций на запрос

# — Настройки эмбеддингов —
embeddings:
  model_name: "intfloat/multilingual-e5-large"   # или BAAI/bge-m3
  device: "cpu"
  normalize: true

# — Qdrant —
qdrant:
  url: "http://localhost:6333"          # docker-режим; убери и верни path для embedded fallback
  collection_name: "obsidian_notes"

# — Оценка качества —
eval:
  report_dir: "reports"              # директория для markdown-отчётов
  recall_warn_threshold: 0.7         # порог для диагностики context_recall
  chunk_preview_len: 150             # символов превью чанка в отчёте

# — История диалогов (SQLite: checkpointer + метаданные сессий) —
persistence:
  db_path: "data/agent.sqlite"       # единый файл БД
  retention_days: 60                 # сессии старше удаляются (2 месяца)
  cleanup_every_sec: 3600            # раз в час ленивый cleanup при GET /api/sessions
  title_max_words: 6                 # ограничение длины автогенерируемого названия
